name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: baishui:scan
          cache-from: type=gha

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baishui:scan
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true